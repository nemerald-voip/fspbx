server {
    listen 127.0.0.1:80;
    server_name 127.0.0.1 localhost;

    root /var/www/fspbx/public;
    index index.php;

    # Compress text assets (JS/CSS/JSON/SVG). text/html is gzipped by default.
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/css application/javascript text/javascript application/json application/xml image/svg+xml;

    # Long-lived immutable caching for content-hashed Vite build assets.
    location ^~ /storage/vite/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;  
        fastcgi_read_timeout 10s;
    }

    # Deny . files
    location ~ /\. {
        deny all;
    }
}
