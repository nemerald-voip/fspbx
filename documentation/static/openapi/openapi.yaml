  '/api/v1/domains/{domain_uuid}/ring-groups':
    get:
      summary: 'List ring groups'
      operationId: listRingGroups
      description: "Returns ring groups for the specified domain the caller is allowed to access.\n\nAccess rules:\n- Caller must have access to the target domain (domain scope).\n- Caller must have the `ring_group_view` permission.\n\nPagination (cursor-based):\n- Both `limit` and `starting_after` are optional.\n- If `limit` is not provided, it defaults to 50.\n- If `starting_after` is not provided, results start from the beginning.\n- If `has_more` is true, request the next page by passing `starting_after`\n  equal to the last item's `ring_group_uuid` from the previous response.\n\nExamples:\n- First page: `GET /api/v1/domains/{domain_uuid}/ring-groups`\n- Next page:  `GET /api/v1/domains/{domain_uuid}/ring-groups?starting_after={last_ring_group_uuid}`\n- Custom size: `GET /api/v1/domains/{domain_uuid}/ring-groups?limit=50`"
      parameters:
        -
          in: query
          name: limit
          description: 'Optional. Number of results to return (min 1, max 100). Defaults to 50.'
          example: 50
          required: false
          schema:
            type: integer
            description: 'Optional. Number of results to return (min 1, max 100). Defaults to 50.'
            example: 50
        -
          in: query
          name: starting_after
          description: 'Optional. Return results after this ring group UUID (cursor).'
          example: c0ec8113-aa15-40ac-8437-47185dd9dcf4
          required: false
          schema:
            type: string
            description: 'Optional. Return results after this ring group UUID (cursor).'
            example: c0ec8113-aa15-40ac-8437-47185dd9dcf4
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  object: list
                  url: /api/v1/domains/4018f7a3-8e0a-47bb-9f4f-04b1313e0e1b/ring-groups
                  has_more: true
                  data:
                    -
                      ring_group_uuid: c0ec8113-aa15-40ac-8437-47185dd9dcf4
                      object: ring_group
                      domain_uuid: 4018f7a3-8e0a-47bb-9f4f-04b1313e0e1b
                      ring_group_name: 'Sales Ring Group'
                      ring_group_extension: '9000'
                      ring_group_enabled: true
                      ring_group_description: null
                properties:
                  object:
                    type: string
                    example: list
                  url:
                    type: string
                    example: /api/v1/domains/4018f7a3-8e0a-47bb-9f4f-04b1313e0e1b/ring-groups
                  has_more:
                    type: boolean
                    example: true
                  data:
                    type: array
                    example:
                      -
                        ring_group_uuid: c0ec8113-aa15-40ac-8437-47185dd9dcf4
                        object: ring_group
                        domain_uuid: 4018f7a3-8e0a-47bb-9f4f-04b1313e0e1b
                        ring_group_name: 'Sales Ring Group'
                        ring_group_extension: '9000'
                        ring_group_enabled: true
                        ring_group_description: null
                    items:
                      type: object
                      properties:
                        ring_group_uuid:
                          type: string
