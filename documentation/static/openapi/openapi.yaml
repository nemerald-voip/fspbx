  '/api/v1/domains/{domain_uuid}/voicemails':
    get:
      summary: 'List voicemails'
      operationId: listVoicemails
      description: "Returns voicemails for the specified domain the caller is allowed to access.\n\nAccess rules:\n- Caller must have access to the target domain (domain scope).\n- Caller must have the `voicemail_domain` permission.\n\nPagination (cursor-based):\n- Both `limit` and `starting_after` are optional.\n- If `limit` is not provided, it defaults to 50.\n- If `starting_after` is not provided, results start from the beginning.\n- If `has_more` is true, request the next page by passing `starting_after`\n  equal to the last item's `voicemail_uuid` from the previous response.\n\nExamples:\n- First page: `GET /api/v1/domains/{domain_uuid}/voicemails`\n- Next page:  `GET /api/v1/domains/{domain_uuid}/voicemails?starting_after={last_voicemail_uuid}`\n- Custom size: `GET /api/v1/domains/{domain_uuid}/voicemails?limit=50`"
      parameters:
        -
          in: query
          name: limit
          description: 'Optional. Number of results to return (min 1, max 100). Defaults to 50.'
          example: 25
          required: false
          schema:
            type: integer
            description: 'Optional. Number of results to return (min 1, max 100). Defaults to 50.'
            example: 25
        -
          in: query
          name: starting_after
          description: 'Optional. Return results after this voicemail UUID (cursor).'
          example: d2c7b17c-8b0d-4f0f-b5ff-2cfb6d7a4f4b
          required: false
          schema:
            type: string
